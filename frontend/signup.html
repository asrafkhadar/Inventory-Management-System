<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Inventory Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signup-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .signup-header p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .signup-btn:active {
            transform: translateY(0);
        }

        .signup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            display: none;
            background-color: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message {
            display: none;
            background-color: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .password-requirements {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .password-requirements strong {
            display: block;
            margin-bottom: 6px;
            color: #333;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .requirement::before {
            content: '○';
            margin-right: 8px;
            color: #ddd;
        }

        .requirement.met::before {
            content: '✓';
            color: #3c3;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <h1>IMS</h1>
            <p>Create Your Account</p>
        </div>

        <form id="signupForm">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Confirm Password</label>
                <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="Confirm your password" required>
            </div>

            <div class="password-requirements">
                <strong>Password Requirements:</strong>
                <div class="requirement" id="req-min-length">
                    At least 6 characters
                </div>
                <div class="requirement" id="req-match">
                    Passwords must match
                </div>
            </div>

            <button type="submit" class="signup-btn" id="signupBtn">Create Account</button>
            <div class="loading" id="loading"></div>
        </form>

        <div class="login-link">
            <p>Already have an account? <a href="/login.html">Sign In</a></p>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin + '/api';

        // Form elements
        const form = document.getElementById('signupForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordConfirmInput = document.getElementById('passwordConfirm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const signupBtn = document.getElementById('signupBtn');

        // Password requirement indicators
        const reqMinLength = document.getElementById('req-min-length');
        const reqMatch = document.getElementById('req-match');

        // Validate password length in real-time
        passwordInput.addEventListener('input', updatePasswordRequirements);
        passwordConfirmInput.addEventListener('input', updatePasswordRequirements);

        function updatePasswordRequirements() {
            const password = passwordInput.value;
            const passwordConfirm = passwordConfirmInput.value;

            // Check minimum length
            if (password.length >= 6) {
                reqMinLength.classList.add('met');
            } else {
                reqMinLength.classList.remove('met');
            }

            // Check if passwords match
            if (password && password === passwordConfirm) {
                reqMatch.classList.add('met');
            } else {
                reqMatch.classList.remove('met');
            }
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const passwordConfirm = passwordConfirmInput.value;

            // Clear messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Validation
            if (!username || !email || !password || !passwordConfirm) {
                showError('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            if (password !== passwordConfirm) {
                showError('Passwords do not match');
                return;
            }

            // Show loading state
            loading.style.display = 'block';
            signupBtn.disabled = true;

            try {
                // Send signup request to Django backend
                const response = await fetch(`${API_BASE_URL}/signup/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password,
                        password_confirm: passwordConfirm
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Show success message
                    successMessage.style.display = 'block';
                    successMessage.textContent = 'Account created successfully! Redirecting to login...';
                    
                    // Clear form
                    form.reset();
                    updatePasswordRequirements();
                    
                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    // Show error from server
                    loading.style.display = 'none';
                    signupBtn.disabled = false;
                    showError(data.error || 'Sign up failed. Please try again.');
                }
            } catch (error) {
                console.error('Signup error:', error);
                loading.style.display = 'none';
                signupBtn.disabled = false;
                showError('Connection error. Please try again.');
            }
        });

        function showError(message) {
            errorMessage.style.display = 'block';
            errorMessage.textContent = message;
        }

        // Redirect if already logged in
        window.addEventListener('load', () => {
            const user = localStorage.getItem('user');
            if (user) {
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
