services:
  - type: web
    name: inventory-management-system
    env: python
    pythonVersion: 3.12
    plan: free
    branch: main
    buildCommand: ./build.sh
    startCommand: cd backend && ../.venv/bin/gunicorn inventory_system.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: inventory_system.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: "REPLACE_WITH_A_STRONG_SECRET"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DB_NAME
        value: "RENDER_DB_NAME"
      - key: DB_USER
        value: "RENDER_DB_USER"
      - key: DB_PASSWORD
        value: "RENDER_DB_PASSWORD"
      - key: DB_HOST
        value: "RENDER_DB_HOST"
      - key: DB_PORT
        value: "5432"

# For a managed Render PostgreSQL database, set these values in the service environment or use the Render dashboard secrets.


